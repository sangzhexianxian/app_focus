# Codemagic Flutter CI/CD 配置文件
# 用于自动构建 iOS 和 Android 应用

workflows:
  # 主工作流 - Android 构建
  android-build:
    name: Android Build
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      flutter: stable
      java: 17
      gradle: latest

    scripts:
      # 显示环境信息
      - name: Show environment info
        script: |
          echo "Flutter version: $(flutter --version)"
          echo "Java version: $(java -version)"

      # 安装依赖
      - name: Install dependencies
        script: |
          flutter pub get

      # 代码分析
      - name: Run Flutter analyze
        script: |
          flutter analyze

      # 运行测试
      - name: Run Flutter tests
        script: |
          flutter test

      # 构建 Android APK
      - name: Build Android APK
        script: |
          flutter build apk \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=$APP_NAME

      # 构建 Android App Bundle (用于 Google Play)
      - name: Build Android App Bundle
        script: |
          flutter build appbundle \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=$APP_NAME

    publishing:
      # 邮件通知
      email:
        recipients:
          - sangzhexianxian@github.com

      # 发布到 Slack (可选)
      # slack:
      #   channel: "#builds"
      #   notify_on_success: true
      #   notify_on_failure: true

  # iOS 构建工作流 (需要 Mac 环境)
  ios-build:
    name: iOS Build
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # 显示环境信息
      - name: Show environment info
        script: |
          echo "Flutter version: $(flutter --version)"
          echo "Xcode version: $(xcodebuild -version)"

      # 安装依赖
      - name: Install dependencies
        script: |
          flutter pub get

      # 安装 CocoaPods 依赖
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      # 代码分析
      - name: Run Flutter analyze
        script: |
          flutter analyze

      # 运行测试
      - name: Run Flutter tests
        script: |
          flutter test

      # 构建 iOS Release
      - name: Build iOS Release
        script: |
          flutter build ios \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=$APP_NAME \
            --no-codesign

    publishing:
      email:
        recipients:
          - sangzhexianxian@github.com

  # Web 构建工作流
  web-build:
    name: Web Build
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      flutter: stable

    scripts:
      # 显示环境信息
      - name: Show environment info
        script: |
          echo "Flutter version: $(flutter --version)"

      # 安装依赖
      - name: Install dependencies
        script: |
          flutter pub get

      # 构建 Web
      - name: Build Web
        script: |
          flutter build web \
            --release \
            --web-renderer canvaskit

    publishing:
      email:
        recipients:
          - sangzhexianxian@github.com

      # 部署到 GitHub Pages
      scripts:
        - name: Deploy to GitHub Pages
          script: |
            git config --global user.email "codemagic@github.com"
            git config --global user.name "Codemagic"
            git remote add origin https://${GITHUB_TOKEN}@github.com/sangzhexianxian/app_focus.git || git remote set-url origin https://${GITHUB_TOKEN}@github.com/sangzhexianxian/app_focus.git
            git checkout gh-pages || git checkout --orphan gh-pages
            git rm -rf .
            cp -r build/web/* .
            git add .
            git commit -m "Deploy to GitHub Pages"
            git push origin gh-pages --force
