name: focus_app
description: FOCUS - 极简目标管理应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI 组件
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # 状态管理
  provider: ^6.1.1
  get: ^4.6.6

  # 数据存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # 网络请求
  http: ^1.1.2
  supabase_flutter: ^2.3.4

  # 图片处理
  cached_network_image: ^3.3.1
  image_gallery_saver: ^2.0.3
  screenshot: ^3.0.0

  # 功能组件
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  flutter_local_notifications: ^16.3.2

  # 工具类
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: CustomFont
      fonts:
        - asset: assets/fonts/CustomFont-Regular.ttf
